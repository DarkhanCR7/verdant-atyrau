services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: verdant
      POSTGRES_PASSWORD: verdant
      POSTGRES_DB: verdant_db
    volumes:
      - verdant_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdant -d verdant_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://verdant:verdant@db:5432/verdant_db"
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in your .env file}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      IP_HASH_SALT: ${IP_HASH_SALT:-change-me}
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "5"
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  verdant_db_data:
